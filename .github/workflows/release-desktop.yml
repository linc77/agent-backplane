name: Release desktop installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing draft release tag
        required: true
        default: v0.4.1

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ inputs.tag }}" --repo "${{ github.repository }}" || \
            gh release create "${{ inputs.tag }}" --repo "${{ github.repository }}" --draft --title "Agent Backplane ${{ inputs.tag }}" --notes "Agent Backplane desktop release."

  desktop:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            update_platform: mac
            command: pnpm exec electron-builder --mac dmg zip --arm64 --publish never -c.mac.identity=null -c.mac.notarize=false
          - platform: windows-latest
            update_platform: win
            command: pnpm exec electron-builder --win nsis --x64 --publish never
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Build installer
        run: ${{ matrix.command }}

      - name: Verify update assets
        shell: bash
        run: pnpm verify:update-assets --dir release --platform "${{ matrix.update_platform }}" --version "${{ inputs.tag }}"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r -d '' asset; do
            gh release upload "${{ inputs.tag }}" "$asset" --clobber
          done < <(find release -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.blockmap' -o -name 'latest*.yml' \) -print0)

  publish-release:
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - name: Publish verified release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ inputs.tag }}" --repo "${{ github.repository }}" --draft=false --latest
