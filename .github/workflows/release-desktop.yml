name: Release desktop installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing draft release tag
        required: true
        default: v0.2.0

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ inputs.tag }}" --repo "${{ github.repository }}" || \
            gh release create "${{ inputs.tag }}" --repo "${{ github.repository }}" --draft --title "Agent Memory Manager ${{ inputs.tag }}" --notes "Electron desktop release."

  desktop:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            command: pnpm exec electron-builder --mac dmg zip --arm64 --publish never
          - platform: windows-latest
            command: pnpm exec electron-builder --win nsis --x64 --publish never
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.command }}

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r -d '' asset; do
            gh release upload "${{ inputs.tag }}" "$asset" --clobber
          done < <(find release -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' \) -print0)
